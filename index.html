<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogTransf - Gestão de Transferências</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236366f1' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='2' y='3' width='20' height='14' rx='2' ry='2'/><line x1='8' y1='21' x2='16' y2='21'/><line x1='12' y1='17' x2='12' y2='21'/></svg>">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Scripts and Libraries -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- Firebase SDK (Compat Version for Vanilla JS) -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/components.css">
</head>

<body>
    <!-- Login Screen System -->
    <div id="login-screen"></div>

    <div class="app-container" id="main-app" style="display: none;">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i data-lucide="truck" class="logo-icon"></i>
                <div class="logo-text">
                    <h2 id="app-brand-name">LogTransf</h2>
                    <span id="app-company-name" class="brand-subtitle">NobelPack</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active" data-target="tab-viagens">
                    <i data-lucide="navigation"></i> Lançamento
                </button>
                <button class="nav-item" data-target="tab-saldo">
                    <i data-lucide="package-plus"></i> Saldo Diário
                </button>
                <button class="nav-item" data-target="tab-dashboard">
                    <i data-lucide="layout-dashboard"></i> Indicadores
                </button>
                <button class="nav-item" data-target="tab-configuracoes">
                    <i data-lucide="settings"></i> Configurações
                </button>
                <button class="nav-item" data-target="tab-gestao">
                    <i data-lucide="shield-check"></i> Gestão
                </button>
            </nav>

            <div class="user-profile">
                <div class="user-sidebar-info">
                    <span id="current-user-name" class="user-sidebar-name">Operador Logístico</span>
                    <span id="current-user-role" class="user-sidebar-role">Acesso Operacional</span>
                </div>
                <div class="user-sidebar-actions">
                    <button id="btn-theme-toggle" title="Alternar Tema" class="nav-item">
                        <i data-lucide="moon"></i> <span>Tema Escuro</span>
                    </button>
                    <button id="btn-change-pass" class="nav-item" onclick="GestaoModule.changeMyPassword()">
                        <i data-lucide="key"></i> <span>Alterar Senha</span>
                    </button>
                    <button id="btn-logout" class="nav-item logout-btn">
                        <i data-lucide="log-out"></i> <span>Sair</span>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="topbar">
                <div class="breadcrumbs">
                    <h1 id="page-title">Bem-vindo ao LogTransf</h1>
                </div>
                <div class="topbar-actions">
                    <span id="current-date-display" class="date-display">6 de Abril, 2026</span>
                </div>
            </header>

            <div class="content-body">
                <!-- AI Side Panel -->
                <div id="ai-panel" class="ai-side-panel"></div>
                <!-- Content will be injected here -->
                <div id="main-view" class="view-container">
                    <div class="welcome-card card" style="text-align: center; padding: 3rem; animation: fadeIn 0.8s ease-out;">
                        <i data-lucide="layout-dashboard" style="width: 48px; height: 48px; color: var(--primary); margin-bottom: 1rem;"></i>
                        <h2>Bem-vindo ao LogTransf</h2>
                        <p style="color: var(--text-muted); max-width: 450px; margin: 0.5rem auto;">O sistema está pronto para uso. Utilize o menu lateral para iniciar seus lançamentos ou visualizar os indicadores operacionais.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Global Modals Container -->
    <div id="modal-container"></div>

    <!-- AI Assistant UI (LogAgend Style) -->
    <div id="ai-chat-bubble" onclick="AIModule.toggle()" title="Assistente IA">
        <i data-lucide="sparkles"></i>
    </div>

    <div id="ai-chat-window">
        <div class="ai-chat-header">
            <h3><i data-lucide="bot"></i> Assistente LogTransf</h3>
            <button class="btn-close-ai" onclick="AIModule.toggle()"><i data-lucide="x"></i></button>
        </div>
        <div id="ai-chat-messages"></div>
        <div class="ai-chat-footer">
            <input type="text" id="ai-chat-input" placeholder="Pergunte ao assistente..." onkeypress="if(event.key==='Enter') AIModule.sendMessage()">
            <button class="btn btn-primary btn-ai-send" onclick="AIModule.sendMessage()">
                <i data-lucide="send"></i>
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="./js/utils.js"></script>
    <script src="./js/firebase-sync.js"></script>
    <script src="./js/store.js"></script>
    <script src="./js/components.js"></script>
    <script src="./js/ai.js"></script>
    
    <!-- Modules -->
    <script src="./js/modules/viagens.js"></script>
    <script src="./js/modules/saldo.js"></script>
    <script src="./js/modules/dashboard.js"></script>
    <script src="./js/modules/gestao.js"></script>
    
    <script src="./js/app.js"></script>
</body>

</html>
